name: Deploy GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Fetch inventories, compare against DB, and update DB tables and buckets"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate config.js
        run: |
          cat > docs/config.js << EOF
          export const SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          export const SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";
          export const BUCKETS = {
            products: "pid-to-info",
            vendors: "vendor-id-to-info",
            inventories: "inventories"
          };
          export const FILES = {
            products: "pid_to_info.json",
            vendors: "vendor_id_to_info.json",
            inventories: "vendor_id_to_offers.json",
            pidToVendors: "pid_to_vendor_offers.json"
          };
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          enable_jekyll: false
